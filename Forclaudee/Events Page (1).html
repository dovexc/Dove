document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-thumb { background: #2a3a4a; border-radius: 6px; }\n  ::-webkit-scrollbar-thumb:hover { background: #3a4f63; }\n  select option { background:#141c26; color:#dbe7f2; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:100%; height:100%; min-height:100vh; display:flex; flex-direction:column; background:#0b1016; font-family:'Archivo',system-ui,sans-serif; color:#c7d5e0; overflow:hidden;\">\n\n  <!-- Title bar -->\n  <div style=\"height:34px; flex:none; display:flex; align-items:center; justify-content:space-between; background:#0a0e13; padding:0 14px; -webkit-app-region:drag;\">\n    <div style=\"display:flex; align-items:center; gap:9px;\">\n      <div style=\"width:15px; height:15px; border-radius:50%; background:radial-gradient(circle at 35% 30%,#5fb0ff,#1a6fc4); box-shadow:0 0 8px rgba(60,150,255,.5);\"><\u002Fdiv>\n      <span style=\"font-size:12px; color:#7b8794; letter-spacing:.2px;\">game-launcher<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:20px;\">\n      <span style=\"color:#5b6671; font-size:14px;\">─<\u002Fspan>\n      <span style=\"color:#5b6671; font-size:13px;\">□<\u002Fspan>\n      <span style=\"color:#8a949f; font-size:15px;\">✕<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Top nav -->\n  <div style=\"height:62px; flex:none; display:flex; align-items:center; justify-content:space-between; padding:0 32px; background:linear-gradient(180deg,#171f29,#121922); border-bottom:1px solid rgba(255,255,255,.04);\">\n    <div style=\"display:flex; align-items:center; gap:30px;\">\n      <span style=\"font-size:17px; font-weight:600; color:#9aa7b3; letter-spacing:.3px;\">Library<\u002Fspan>\n      <span style=\"font-size:17px; font-weight:600; color:#9aa7b3; letter-spacing:.3px;\">Store<\u002Fspan>\n      <div style=\"display:flex; flex-direction:column; align-items:center; gap:6px;\">\n        <span style=\"font-size:17px; font-weight:700; color:#ffffff; letter-spacing:.3px;\">Events<\u002Fspan>\n        <span style=\"width:22px; height:3px; border-radius:2px; background:linear-gradient(90deg,#3aa0ff,#66c0f4);\"><\u002Fspan>\n      <\u002Fdiv>\n      <span style=\"font-size:17px; font-weight:600; color:#9aa7b3; letter-spacing:.3px;\">Downloads<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display: flex; align-items: center; gap: 16px; position: relative\">\n      <button title=\"Notifications\" style=\"position:relative; width:40px; height:40px; border-radius:10px; border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04); display:flex; align-items:center; justify-content:center; cursor:pointer;\" style-hover=\"background:rgba(58,160,255,.14); border-color:rgba(120,180,240,.35);\">\n        <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9fb2c2\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9\"><\u002Fpath><path d=\"M13.73 21a2 2 0 0 1-3.46 0\"><\u002Fpath><\u002Fsvg>\n        \n      <\u002Fbutton>\n      <div style=\"width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800; color:#fff; background:linear-gradient(135deg,#3aa0ff,#7b4397); box-shadow:0 4px 12px rgba(58,120,200,.3);\">D<\u002Fdiv>\n    <span style=\"position: absolute; top: -5px; min-width: 16px; height: 16px; padding: 0 4px; border-radius: 8px; background: #ff4655; border: 2px solid #141b24; color: #fff; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; line-height: 1; left: 29px; font-family: Arial\">3<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Scroll area -->\n  <div style=\"flex:1; overflow-y:auto; overflow-x:hidden; background:radial-gradient(1200px 600px at 50% -150px,#1c2c3e 0%,#0d141c 55%,#0b1016 100%);\">\n\n    <!-- ===================== EVENT DETAIL VIEW ===================== -->\n    <sc-if value=\"{{ detailOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1000px; margin:0 auto; padding:30px 40px 90px;\">\n\n      <button onclick=\"{{ closeDetail }}\" style=\"font-family:inherit; font-size:14px; font-weight:700; color:#c7d5e0; padding:10px 18px; border-radius:9px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); cursor:pointer; display:flex; align-items:center; gap:8px; margin-bottom:28px;\" style-hover=\"background:rgba(255,255,255,.1); color:#fff;\">← Back to events<\u002Fbutton>\n\n      <!-- Title row -->\n      <div style=\"display:flex; align-items:flex-start; justify-content:space-between; gap:24px; margin-bottom:18px;\">\n        <div>\n          <h1 style=\"margin:0; font-size:40px; font-weight:900; color:#ffffff; letter-spacing:-.8px; line-height:1;\">{{ d.name }}<\u002Fh1>\n          <div style=\"font-size:15px; color:#7b8794; margin-top:10px;\">by {{ d.organizer }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:none; display:flex; align-items:center; gap:8px; background:linear-gradient(180deg,rgba(190,238,17,.16),rgba(120,150,10,.1)); border:1px solid rgba(190,238,17,.3); color:#d4f436; font-weight:800; font-size:20px; padding:12px 20px; border-radius:11px; box-shadow:0 8px 22px rgba(120,150,10,.18);\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#d4f436\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2Z\"><\u002Fpath><\u002Fsvg>\n          {{ d.prize }}\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Status + type pills -->\n      <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:28px;\">\n        <span style=\"font-size:12px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:#fff; background:{{ d.typeBg }}; padding:7px 13px; border-radius:7px;\">{{ d.type }}<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:7px; font-size:13px; font-weight:700; color:{{ d.statusColor }}; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); padding:6px 13px; border-radius:7px;\">\n          <span style=\"width:8px; height:8px; border-radius:50%; background:{{ d.statusColor }}; box-shadow:0 0 8px {{ d.statusColor }};\"><\u002Fspan>{{ d.statusLabel }}\n        <\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- Prize distribution card -->\n      <div style=\"background:linear-gradient(180deg,#141d27,#111923); border:1px solid rgba(255,255,255,.06); border-radius:13px; padding:20px 22px; margin-bottom:18px;\">\n        <div style=\"font-size:12px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#5b8db8; margin-bottom:10px;\">Prize distribution<\u002Fdiv>\n        <div style=\"font-size:16px; color:#dbe7f2; line-height:1.5;\">{{ d.distribution }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Dates card -->\n      <div style=\"background:linear-gradient(180deg,#141d27,#111923); border:1px solid rgba(255,255,255,.06); border-radius:13px; padding:20px 22px; margin-bottom:26px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px;\">\n        <sc-for list=\"{{ d.dates }}\" as=\"dt\" hint-placeholder-count=\"3\">\n          <div>\n            <div style=\"font-size:11px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:#6b7884; margin-bottom:6px;\">{{ dt.label }}<\u002Fdiv>\n            <div style=\"font-size:18px; font-weight:700; color:#f0f6fb;\">{{ dt.value }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- Two columns: description/participants + chat -->\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:24px; align-items:start;\">\n\n        <!-- Left column -->\n        <div style=\"display:flex; flex-direction:column; gap:28px;\">\n          <div>\n            <div style=\"font-size:12px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#5b8db8; margin-bottom:12px;\">Description<\u002Fdiv>\n            <div style=\"font-size:15px; color:#c7d5e0; line-height:1.6;\">{{ d.description }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div>\n            <div style=\"font-size:12px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#5b8db8; margin-bottom:12px;\">Participants ({{ d.participantCount }})<\u002Fdiv>\n            <sc-if value=\"{{ d.hasParticipants }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; flex-direction:column; gap:8px;\">\n                <sc-for list=\"{{ d.participants }}\" as=\"p\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex; align-items:center; gap:12px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); border-radius:10px; padding:10px 13px;\">\n                    <div style=\"width:34px; height:34px; border-radius:9px; flex:none; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#fff; background:{{ p.bg }};\">{{ p.initial }}<\u002Fdiv>\n                    <span style=\"font-size:14px; font-weight:600; color:#e8f1f8;\">{{ p.name }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ d.noParticipants }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font-size:14px; color:#7b8794; background:rgba(255,255,255,.02); border:1px dashed rgba(255,255,255,.1); border-radius:10px; padding:18px 16px; text-align:center;\">No participants yet.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <button onclick=\"{{ deleteEvent }}\" style=\"align-self:flex-start; font-family:inherit; font-size:14px; font-weight:700; color:#ff8a7a; padding:11px 20px; border-radius:9px; border:1px solid rgba(255,70,85,.3); background:rgba(255,70,85,.08); cursor:pointer; display:flex; align-items:center; gap:8px;\" style-hover=\"background:rgba(255,70,85,.18); color:#ff9f92;\">\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2\"><\u002Fpath><\u002Fsvg>\n            Delete event\n          <\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- Right column: chat -->\n        <div>\n          <div style=\"font-size:12px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#5b8db8; margin-bottom:12px;\">Event chat<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; background:linear-gradient(180deg,#141d27,#111923); border:1px solid rgba(255,255,255,.06); border-radius:13px; overflow:hidden; height:440px;\">\n            <!-- messages -->\n            <div style=\"flex:1; overflow-y:auto; padding:16px 16px; display:flex; flex-direction:column; gap:12px;\">\n              <sc-if value=\"{{ chatEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"margin:auto; text-align:center; color:#5b6671; font-size:14px;\">No messages yet. Write the first one!<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-for list=\"{{ messages }}\" as=\"m\" hint-placeholder-count=\"0\">\n                <div style=\"display:flex; gap:10px;\">\n                  <div style=\"width:32px; height:32px; border-radius:9px; flex:none; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:#fff; background:{{ m.bg }};\">{{ m.initial }}<\u002Fdiv>\n                  <div>\n                    <div style=\"display:flex; align-items:baseline; gap:8px;\"><span style=\"font-size:13px; font-weight:700; color:#e8f1f8;\">{{ m.author }}<\u002Fspan><span style=\"font-size:11px; color:#5b6671;\">{{ m.time }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"font-size:14px; color:#c7d5e0; margin-top:2px; line-height:1.4;\">{{ m.text }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <!-- input -->\n            <div style=\"flex:none; display:flex; gap:10px; padding:13px 14px; border-top:1px solid rgba(255,255,255,.06); background:rgba(0,0,0,.2);\">\n              <input value=\"{{ draft }}\" oninput=\"{{ onDraft }}\" onkeydown=\"{{ onKey }}\" placeholder=\"Message all participants...\" style=\"flex:1; background:#0d141c; border:1px solid rgba(255,255,255,.08); border-radius:9px; padding:0 14px; height:44px; outline:none; color:#dbe7f2; font-family:inherit; font-size:14px;\" style-focus=\"border-color:rgba(120,180,240,.6);\">\n              <button onclick=\"{{ send }}\" style=\"flex:none; font-family:inherit; font-size:14px; font-weight:700; color:#fff; padding:0 22px; height:44px; border-radius:9px; border:none; cursor:pointer; background:linear-gradient(180deg,#3aa0ff,#2475c7); box-shadow:0 6px 16px rgba(40,120,200,.3);\" style-hover=\"background:linear-gradient(180deg,#52b0ff,#2f82d8);\">Send<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== HOST EVENT VIEW ===================== -->\n    <sc-if value=\"{{ creating }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1040px; margin:0 auto; padding:30px 40px 90px;\">\n\n      <!-- Host header -->\n      <div style=\"display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:26px;\">\n        <div>\n          <div style=\"font-size:13px; font-weight:800; letter-spacing:4px; color:#5b8db8; text-transform:uppercase; margin-bottom:8px;\">Host event<\u002Fdiv>\n          <h1 style=\"margin:0; font-size:34px; font-weight:900; color:#ffffff; letter-spacing:-.6px;\">{{ hostTitle }}<\u002Fh1>\n        <\u002Fdiv>\n        <button onclick=\"{{ closeForm }}\" style=\"font-family:inherit; font-size:15px; font-weight:700; color:#c7d5e0; padding:12px 24px; border-radius:9px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); cursor:pointer;\" style-hover=\"background:rgba(255,255,255,.1); color:#fff;\">Cancel<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- STEP 1: choose type -->\n      <sc-if value=\"{{ stepType }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:22px;\">\n          <sc-for list=\"{{ typeCards }}\" as=\"tc\" hint-placeholder-count=\"2\">\n            <button onclick=\"{{ tc.pick }}\" style=\"text-align:left; font-family:inherit; cursor:pointer; display:flex; flex-direction:column; gap:0; border-radius:14px; overflow:hidden; border:1px solid rgba(255,255,255,.08); background:linear-gradient(180deg,#161f2a,#121a23); padding:0; transition:transform .16s, box-shadow .16s, border-color .16s;\" style-hover=\"transform:translateY(-4px); box-shadow:0 18px 40px rgba(0,0,0,.5); border-color:rgba(120,180,240,.4);\">\n              <div style=\"height:120px; background:{{ tc.art }}; position:relative;\">\n                <div style=\"position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(18,26,35,.7));\"><\u002Fdiv>\n                <div style=\"position:absolute; left:20px; bottom:14px; display:flex; align-items:center; gap:11px;\">\n                  <div style=\"width:44px; height:44px; border-radius:12px; background:rgba(10,14,19,.55); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; color:#fff;\">{{ tc.icon }}<\u002Fdiv>\n                  <span style=\"font-size:22px; font-weight:900; color:#fff; letter-spacing:-.3px;\">{{ tc.name }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:18px 20px;\">\n                <div style=\"font-size:14px; color:#9fb2c2; line-height:1.5;\">{{ tc.desc }}<\u002Fdiv>\n                <div style=\"margin-top:14px; font-size:13px; font-weight:700; color:#9fe3ff;\">Choose →<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 2: form -->\n      <sc-if value=\"{{ stepForm }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:linear-gradient(180deg,#141d27,#111923); border:1px solid rgba(255,255,255,.06); border-radius:16px; padding:30px 32px;\">\n\n          <button onclick=\"{{ backToType }}\" style=\"font-family:inherit; font-size:13px; font-weight:700; color:#5b8db8; background:none; border:none; padding:0; cursor:pointer; margin-bottom:24px; display:flex; align-items:center; gap:6px;\" style-hover=\"color:#9fe3ff;\">← Choose other type<\u002Fbutton>\n\n          <!-- Section: Basics -->\n          <div style=\"font-size:12px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#5b8db8; margin-bottom:16px;\">Basics<\u002Fdiv>\n\n          <div style=\"margin-bottom:20px;\">\n            <label style=\"display:block; font-size:14px; font-weight:600; color:#c7d5e0; margin-bottom:8px;\">Title<\u002Flabel>\n            <input placeholder=\"{{ titlePlaceholder }}\" style=\"width:100%; background:#0d141c; border:1px solid rgba(255,255,255,.08); border-radius:9px; padding:0 16px; height:48px; outline:none; color:#dbe7f2; font-family:inherit; font-size:15px;\" style-focus=\"border-color:rgba(120,180,240,.6);\">\n          <\u002Fdiv>\n\n          <div style=\"margin-bottom:20px;\">\n            <label style=\"display:block; font-size:14px; font-weight:600; color:#c7d5e0; margin-bottom:8px;\">Description<\u002Flabel>\n            <textarea placeholder=\"Rules, theme, format, ...\" style=\"width:100%; background:#0d141c; border:1px solid rgba(255,255,255,.08); border-radius:9px; padding:13px 16px; min-height:110px; resize:vertical; outline:none; color:#dbe7f2; font-family:inherit; font-size:15px; line-height:1.5;\" style-focus=\"border-color:rgba(120,180,240,.6);\"><\u002Ftextarea>\n          <\u002Fdiv>\n\n          <div style=\"margin-bottom:28px;\">\n            <label style=\"display:block; font-size:14px; font-weight:600; color:#c7d5e0; margin-bottom:8px;\">Theme <span style=\"color:#6b7884; font-weight:400;\">(optional)<\u002Fspan><\u002Flabel>\n            <input placeholder=\"e.g. Roguelike, Cozy, Horror, ...\" style=\"width:100%; background:#0d141c; border:1px solid rgba(255,255,255,.08); border-radius:9px; padding:0 16px; height:48px; outline:none; color:#dbe7f2; font-family:inherit; font-size:15px;\" style-focus=\"border-color:rgba(120,180,240,.6);\">\n          <\u002Fdiv>\n\n          <!-- Section: Schedule -->\n          <div style=\"font-size:12px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#5b8db8; margin-bottom:16px; padding-top:8px; border-top:1px solid rgba(255,255,255,.06);\">Schedule<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:28px;\">\n            <sc-for list=\"{{ dateFields }}\" as=\"df\" hint-placeholder-count=\"3\">\n              <div>\n                <label style=\"display:block; font-size:14px; font-weight:600; color:#c7d5e0; margin-bottom:8px;\">{{ df.label }}<\u002Flabel>\n                <input type=\"date\" style=\"width:100%; background:#0d141c; border:1px solid rgba(255,255,255,.08); border-radius:9px; padding:0 14px; height:48px; outline:none; color:#dbe7f2; font-family:inherit; font-size:15px; color-scheme:dark;\" style-focus=\"border-color:rgba(120,180,240,.6);\">\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- Section: Prize (tournament only) -->\n          <sc-if value=\"{{ isTournament }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size:12px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#5b8db8; margin-bottom:16px; padding-top:8px; border-top:1px solid rgba(255,255,255,.06);\">Prize<\u002Fdiv>\n\n            <div style=\"display:grid; grid-template-columns:240px 1fr; gap:20px; margin-bottom:28px; align-items:start;\">\n              <div>\n                <label style=\"display:block; font-size:14px; font-weight:600; color:#c7d5e0; margin-bottom:8px;\">Prize money (€)<\u002Flabel>\n                <input type=\"number\" placeholder=\"0\" style=\"width:100%; background:#0d141c; border:1px solid rgba(255,255,255,.08); border-radius:9px; padding:0 16px; height:48px; outline:none; color:#dbe7f2; font-family:inherit; font-size:15px;\" style-focus=\"border-color:rgba(120,180,240,.6);\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"display:block; font-size:14px; font-weight:600; color:#c7d5e0; margin-bottom:8px;\">Prize distribution<\u002Flabel>\n                <div style=\"display:flex; gap:10px;\">\n                  <sc-for list=\"{{ splitOptions }}\" as=\"so\" hint-placeholder-count=\"2\">\n                    <button onclick=\"{{ so.pick }}\" style=\"flex:1; display:flex; align-items:center; gap:10px; font-family:inherit; font-size:14px; font-weight:600; padding:0 16px; height:48px; border-radius:9px; cursor:pointer; border:1px solid {{ so.border }}; background:{{ so.bg }}; color:{{ so.color }};\">\n                      <span style=\"width:18px; height:18px; border-radius:50%; flex:none; border:2px solid {{ so.ring }}; display:flex; align-items:center; justify-content:center;\"><span style=\"width:8px; height:8px; border-radius:50%; background:{{ so.dot }};\"><\u002Fspan><\u002Fspan>\n                      {{ so.label }}\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- Section: Participation -->\n          <div style=\"font-size:12px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:#5b8db8; margin-bottom:16px; padding-top:8px; border-top:1px solid rgba(255,255,255,.06);\">Participation<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:22px;\">\n            <div>\n              <label style=\"display:block; font-size:14px; font-weight:600; color:#c7d5e0; margin-bottom:8px;\">{{ sizeLabel }}<\u002Flabel>\n              <select style=\"width:100%; font-family:inherit; font-size:15px; font-weight:500; color:#dbe7f2; background:#0d141c; border:1px solid rgba(255,255,255,.08); border-radius:9px; padding:0 16px; height:48px; cursor:pointer;\">\n                <option>Unlimited<\u002Foption>\n                <option>8<\u002Foption>\n                <option>16<\u002Foption>\n                <option>32<\u002Foption>\n                <option>64<\u002Foption>\n                <option>128<\u002Foption>\n              <\u002Fselect>\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block; font-size:14px; font-weight:600; color:#c7d5e0; margin-bottom:8px;\">Team size (people per team)<\u002Flabel>\n              <input type=\"number\" value=\"1\" style=\"width:100%; background:#0d141c; border:1px solid rgba(255,255,255,.08); border-radius:9px; padding:0 16px; height:48px; outline:none; color:#dbe7f2; font-family:inherit; font-size:15px;\" style-focus=\"border-color:rgba(120,180,240,.6);\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Private toggle -->\n          <button onclick=\"{{ togglePrivate }}\" style=\"display:flex; align-items:center; gap:12px; background:none; border:none; padding:0; cursor:pointer; font-family:inherit; margin-bottom:30px;\">\n            <span style=\"width:22px; height:22px; flex:none; border-radius:6px; border:1px solid {{ privBorder }}; background:{{ privBg }}; display:flex; align-items:center; justify-content:center;\">\n              <sc-if value=\"{{ isPrivate }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fsc-if>\n            <\u002Fspan>\n            <span style=\"font-size:14px; font-weight:600; color:#c7d5e0;\">Private event <span style=\"color:#6b7884; font-weight:400;\">— joinable via code only<\u002Fspan><\u002Fspan>\n          <\u002Fbutton>\n\n          <!-- Footer actions -->\n          <div style=\"display:flex; align-items:center; justify-content:flex-end; gap:14px; padding-top:22px; border-top:1px solid rgba(255,255,255,.06);\">\n            <button onclick=\"{{ closeForm }}\" style=\"font-family:inherit; font-size:15px; font-weight:700; color:#c7d5e0; padding:12px 24px; border-radius:9px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); cursor:pointer;\" style-hover=\"background:rgba(255,255,255,.1); color:#fff;\">Cancel<\u002Fbutton>\n            <button style=\"font-family:inherit; font-size:15px; font-weight:700; color:#fff; padding:12px 30px; border-radius:9px; border:none; cursor:pointer; background:linear-gradient(180deg,#3aa0ff,#2475c7); box-shadow:0 8px 22px rgba(40,120,200,.4);\" style-hover=\"background:linear-gradient(180deg,#52b0ff,#2f82d8);\">Publish<\u002Fbutton>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== DISCOVER VIEW ===================== -->\n    <sc-if value=\"{{ browsing }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"max-width:1500px; margin:0 auto; padding:30px 40px 90px;\">\n\n      <!-- Header -->\n      <div style=\"display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:26px;\">\n        <div>\n          <div style=\"font-size:13px; font-weight:800; letter-spacing:4px; color:#5b8db8; text-transform:uppercase; margin-bottom:8px;\">Game Jams &amp; Tournaments<\u002Fdiv>\n          <h1 style=\"margin:0; font-size:34px; font-weight:900; color:#ffffff; letter-spacing:-.6px;\">Discover events<\u002Fh1>\n        <\u002Fdiv>\n        <button onclick=\"{{ openForm }}\" style=\"display:flex; align-items:center; gap:9px; font-family:inherit; font-size:15px; font-weight:700; color:#fff; padding:12px 24px; border-radius:9px; border:none; cursor:pointer; background:linear-gradient(180deg,#3aa0ff,#2475c7); box-shadow:0 8px 22px rgba(40,120,200,.4);\" style-hover=\"background:linear-gradient(180deg,#52b0ff,#2f82d8);\">\n          <span style=\"font-size:18px; line-height:1;\">+<\u002Fspan> Host event\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- Filter bar -->\n      <div style=\"background:linear-gradient(180deg,#141d27,#111923); border:1px solid rgba(255,255,255,.06); border-radius:13px; padding:18px 20px; margin-bottom:30px;\">\n        <div style=\"display:flex; gap:14px; flex-wrap:wrap; align-items:center;\">\n          <!-- main search -->\n          <div style=\"flex:1; min-width:260px; display:flex; align-items:center; gap:11px; background:#0d141c; border:1px solid rgba(255,255,255,.08); border-radius:8px; padding:0 16px; height:46px;\">\n            <span style=\"color:#5b6b7a; font-size:16px;\">🔍<\u002Fspan>\n            <input value=\"{{ query }}\" oninput=\"{{ onSearch }}\" placeholder=\"Search tournament by game...\" style=\"flex:1; background:none; border:none; outline:none; color:#dbe7f2; font-family:inherit; font-size:15px;\">\n          <\u002Fdiv>\n          <!-- type -->\n          <div style=\"display:flex; align-items:center; gap:9px;\">\n            <span style=\"font-size:13px; font-weight:600; color:#7b8794;\">Type<\u002Fspan>\n            <select value=\"{{ type }}\" onchange=\"{{ onType }}\" style=\"font-family:inherit; font-size:14px; font-weight:600; color:#dbe7f2; background:#0d141c; border:1px solid rgba(255,255,255,.08); border-radius:8px; padding:0 14px; height:46px; cursor:pointer;\">\n              <option>All<\u002Foption>\n              <option>Tournament<\u002Foption>\n              <option>Game Jam<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <!-- private code -->\n          <div style=\"display:flex; align-items:center; gap:8px;\">\n            <input placeholder=\"Join private tournament via code\" style=\"width:230px; background:#0d141c; border:1px solid rgba(255,255,255,.08); border-radius:8px; padding:0 14px; height:46px; outline:none; color:#dbe7f2; font-family:inherit; font-size:14px;\">\n            <button style=\"font-family:inherit; font-size:14px; font-weight:700; color:#dbe7f2; padding:0 18px; height:46px; border-radius:8px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); cursor:pointer;\" style-hover=\"background:rgba(255,255,255,.1); color:#fff;\">Join<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- toggle chips + sort -->\n        <div style=\"display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,.05);\">\n          <sc-for list=\"{{ chips }}\" as=\"c\" hint-placeholder-count=\"2\">\n            <button onclick=\"{{ c.go }}\" style=\"display:flex; align-items:center; gap:8px; font-family:inherit; font-size:13px; font-weight:600; padding:0 15px; height:38px; border-radius:20px; cursor:pointer; border:1px solid {{ c.border }}; background:{{ c.bg }}; color:{{ c.color }};\">\n              <span style=\"width:7px; height:7px; border-radius:50%; background:{{ c.dot }};\"><\u002Fspan>{{ c.label }}\n            <\u002Fbutton>\n          <\u002Fsc-for>\n          <div style=\"margin-left:auto; display:flex; align-items:center; gap:9px;\">\n            <span style=\"font-size:13px; font-weight:600; color:#7b8794;\">Sort<\u002Fspan>\n            <select style=\"font-family:inherit; font-size:14px; font-weight:600; color:#dbe7f2; background:#0d141c; border:1px solid rgba(255,255,255,.08); border-radius:8px; padding:0 14px; height:38px; cursor:pointer;\">\n              <option>Registration deadline<\u002Foption>\n              <option>Prize money<\u002Foption>\n              <option>Participants<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- results count -->\n      <div style=\"font-size:13px; color:#7b8794; margin-bottom:16px;\">{{ count }} events found<\u002Fdiv>\n\n      <!-- Event grid -->\n      <sc-if value=\"{{ hasResults }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:22px;\">\n          <sc-for list=\"{{ events }}\" as=\"e\" hint-placeholder-count=\"6\">\n            <div onclick=\"{{ e.open }}\" style=\"display:flex; flex-direction:column; border-radius:12px; overflow:hidden; background:linear-gradient(180deg,#161f2a,#121a23); border:1px solid rgba(255,255,255,.06); cursor:pointer; transition:transform .16s, box-shadow .16s, border-color .16s;\" style-hover=\"transform:translateY(-4px); box-shadow:0 18px 38px rgba(0,0,0,.5); border-color:rgba(120,180,240,.3);\">\n              <!-- banner -->\n              <div style=\"position:relative; height:130px; background:{{ e.art }};\">\n                <div style=\"position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(18,26,35,.85));\"><\u002Fdiv>\n                <div style=\"position:absolute; top:12px; left:12px; font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:#fff; background:{{ e.typeBg }}; padding:5px 11px; border-radius:6px;\">{{ e.type }}<\u002Fdiv>\n                <div style=\"position:absolute; top:12px; right:12px; display:flex; align-items:center; gap:6px; background:rgba(10,14,19,.7); backdrop-filter:blur(4px); padding:5px 10px; border-radius:6px; font-size:11px; font-weight:700; color:{{ e.statusColor }};\">\n                  <span style=\"width:7px; height:7px; border-radius:50%; background:{{ e.statusColor }};\"><\u002Fspan>{{ e.status }}\n                <\u002Fdiv>\n                <div style=\"position:absolute; left:16px; bottom:12px; right:16px; font-size:20px; font-weight:900; color:#fff; line-height:1.05; letter-spacing:-.3px; text-shadow:0 2px 12px rgba(0,0,0,.6);\">{{ e.name }}<\u002Fdiv>\n              <\u002Fdiv>\n              <!-- body -->\n              <div style=\"padding:16px 17px; display:flex; flex-direction:column; gap:14px; flex:1;\">\n                <div style=\"font-size:13px; color:#8a97a5;\">{{ e.game }}<\u002Fdiv>\n                <div style=\"display:flex; gap:10px;\">\n                  <div style=\"flex:1; background:rgba(255,255,255,.03); border-radius:8px; padding:10px 12px;\">\n                    <div style=\"font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:#6b7884;\">Prize money<\u002Fdiv>\n                    <div style=\"font-size:16px; font-weight:800; color:#beee11; margin-top:3px;\">{{ e.prize }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex:1; background:rgba(255,255,255,.03); border-radius:8px; padding:10px 12px;\">\n                    <div style=\"font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:#6b7884;\">Participants<\u002Fdiv>\n                    <div style=\"font-size:16px; font-weight:800; color:#dbe7f2; margin-top:3px;\">{{ e.players }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:4px;\">\n                  <span style=\"font-size:12px; color:#7b8794;\">Deadline: {{ e.deadline }}<\u002Fspan>\n                  <button style=\"font-family:inherit; font-size:13px; font-weight:700; color:#9fe3ff; padding:8px 16px; border-radius:7px; border:1px solid rgba(95,160,255,.3); background:rgba(58,160,255,.12); cursor:pointer;\" style-hover=\"background:rgba(58,160,255,.25); color:#fff;\">Register<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Empty state -->\n      <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:30px; background:linear-gradient(180deg,#141d27,#111923); border:1px dashed rgba(255,255,255,.12); border-radius:14px; padding:64px 30px; text-align:center;\">\n          <div style=\"width:64px; height:64px; border-radius:18px; margin:0 auto 18px; background:rgba(58,160,255,.1); display:flex; align-items:center; justify-content:center;\">\n            <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5b8db8\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 2v4M16 2v4M3 10h18\"><\u002Fpath><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"font-size:19px; font-weight:800; color:#e8f1f8; margin-bottom:8px;\">No events found<\u002Fdiv>\n          <div style=\"font-size:14px; color:#7b8794; max-width:380px; margin:0 auto 22px;\">Adjust your filters or host your own tournament or game jam.<\u002Fdiv>\n          <button onclick=\"{{ openForm }}\" style=\"font-family:inherit; font-size:14px; font-weight:700; color:#fff; padding:11px 24px; border-radius:9px; border:none; cursor:pointer; background:linear-gradient(180deg,#3aa0ff,#2475c7); box-shadow:0 6px 16px rgba(40,120,200,.3);\" style-hover=\"background:linear-gradient(180deg,#52b0ff,#2f82d8);\">Host event<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <!-- bottom status bar -->\n  <div style=\"height:40px; flex:none; display:flex; align-items:center; gap:20px; padding:0 28px; background:#0a0e13; border-top:1px solid rgba(255,255,255,.05); font-size:13px;\">\n    <span style=\"color:#9aa7b3; font-weight:600;\">Downloads<\u002Fspan>\n    <span style=\"display:flex; align-items:center; gap:8px; color:#6b7884;\"><span style=\"width:8px; height:8px; border-radius:50%; background:#5fd17a;\"><\u002Fspan>Ready<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { query: \"\", type: \"All\", openOnly: false, prizeOnly: false,\n            creating: false, step: \"type\", eventType: null, prizeSplit: \"winner\", isPrivate: false,\n            detailIdx: null, draft: \"\", chats: {} };\n\n  get all() {\n    return [\n      { name:\"Indie Speedrun Cup\", game:\"My first indie game\", type:\"Tournament\", typeBg:\"#2475c7\", prize:\"\\u20ac500\", players:\"24 / 64\", deadline:\"Jul 5\", status:\"Open\", open:true, hasPrize:true, art:\"linear-gradient(125deg,#2b5876,#4e4376)\",\n        organizer:\"dovexc\", distribution:\"Winner takes all \\u2014 the winner receives the entire prize pool.\", description:\"Race through My first indie game on a fixed seed. Fastest verified run wins. Bracket-style finals streamed live.\", dates:[\"Jul 3\",\"Jul 5\",\"Jul 6\"] },\n      { name:\"48h Pixel Jam\", game:\"Any engine game\", type:\"Game Jam\", typeBg:\"#7b4397\", prize:\"\\u20ac1,000\", players:\"112 joined\", deadline:\"Jul 12\", status:\"Open\", open:true, hasPrize:true, art:\"linear-gradient(125deg,#614385,#516395)\",\n        organizer:\"dovexc\", distribution:\"Split across places 1\\u20133 \\u2014 50% / 30% / 20%.\", description:\"Build a game in 48 hours around the theme \\\"Lost Worlds\\\". Any engine allowed.\", dates:[\"Jul 4\",\"Jul 5\",\"Jul 7\"] },\n      { name:\"Neon Drift Grand Prix\", game:\"Neon Drift\", type:\"Tournament\", typeBg:\"#2475c7\", prize:\"\\u20ac750\", players:\"48 / 48\", deadline:\"Closed\", status:\"Full\", open:false, hasPrize:true, art:\"linear-gradient(125deg,#f7008e,#330867)\",\n        organizer:\"NeonLabs\", distribution:\"Split across places 1\\u20133 \\u2014 60% / 25% / 15%.\", description:\"Top-tier time-attack championship across all eight Neon Drift circuits.\", dates:[\"Jun 28\",\"Jul 1\",\"Jul 3\"] },\n      { name:\"Hollow Depths Co-op Clash\", game:\"Hollow Depths\", type:\"Tournament\", typeBg:\"#2475c7\", prize:\"None\", players:\"18 / 32\", deadline:\"Jul 20\", status:\"Open\", open:true, hasPrize:false, art:\"linear-gradient(125deg,#0f2027,#2c5364)\",\n        organizer:\"dovexc\", distribution:\"No prize money \\u2014 played for ranking and bragging rights.\", description:\"Two-player co-op gauntlet. Clear the deepest floor in the fastest time.\", dates:[\"Jul 16\",\"Jul 20\",\"Jul 21\"] },\n      { name:\"Cozy Summer Jam\", game:\"Any engine game\", type:\"Game Jam\", typeBg:\"#7b4397\", prize:\"\\u20ac300\", players:\"67 joined\", deadline:\"Aug 1\", status:\"Open\", open:true, hasPrize:true, art:\"linear-gradient(125deg,#56ab2f,#a8e063)\",\n        organizer:\"IndieHaus\", distribution:\"Winner takes all \\u2014 the winner receives the entire prize pool.\", description:\"A laid-back week-long jam. Make something warm and wholesome. Theme revealed at start.\", dates:[\"Jul 28\",\"Aug 1\",\"Aug 8\"] },\n      { name:\"Roguelike Gauntlet\", game:\"Starbound Echoes\", type:\"Tournament\", typeBg:\"#2475c7\", prize:\"\\u20ac1,500\", players:\"30 / 100\", deadline:\"Aug 8\", status:\"Open\", open:true, hasPrize:true, art:\"linear-gradient(125deg,#360033,#0b8793)\",\n        organizer:\"dovexc\", distribution:\"Split across places 1\\u20133 \\u2014 50% / 30% / 20%.\", description:\"Survive the deepest seeded run in Starbound Echoes. Daily leaderboard resets.\", dates:[\"Aug 5\",\"Aug 8\",\"Aug 9\"] },\n    ];\n  }\n\n  sendMsg() {\n    const text = (this.state.draft || \"\").trim();\n    const di = this.state.detailIdx;\n    if (!text || di === null) return;\n    const now = new Date();\n    const time = now.getHours().toString().padStart(2,\"0\") + \":\" + now.getMinutes().toString().padStart(2,\"0\");\n    const msg = { author:\"dovexc\", initial:\"D\", time, text, bg:this.avatarBg(\"dovexc\") };\n    this.setState(s => ({\n      chats: { ...s.chats, [di]: [ ...(s.chats[di] || []), msg ] },\n      draft: \"\",\n    }));\n  }\n\n  avatarBg(name) {\n    const palettes = [\"linear-gradient(135deg,#3aa0ff,#7b4397)\",\"linear-gradient(135deg,#2b5876,#4e4376)\",\"linear-gradient(135deg,#56ab2f,#0b8793)\",\"linear-gradient(135deg,#c31432,#240b36)\",\"linear-gradient(135deg,#0052d4,#65c7f7)\"];\n    let h = 0; for (let i=0;i<name.length;i++) h = (h*31 + name.charCodeAt(i)) >>> 0;\n    return palettes[h % palettes.length];\n  }\n\n  renderVals() {\n    const q = this.state.query.toLowerCase();\n    const t = this.state.type;\n    const allEvents = this.all;\n    const events = allEvents\n      .map((e, idx) => ({ ...e, _idx: idx }))\n      .filter(e => t === \"All\" || e.type === t)\n      .filter(e => !this.state.openOnly || e.open)\n      .filter(e => !this.state.prizeOnly || e.hasPrize)\n      .filter(e => q === \"\" || e.game.toLowerCase().includes(q) || e.name.toLowerCase().includes(q))\n      .map(e => ({ ...e, statusColor: e.open ? \"#5fd17a\" : \"#ff7a6b\",\n                 open: () => this.setState({ detailIdx: e._idx }) }));\n\n    const chip = (label, key) => {\n      const on = this.state[key];\n      return {\n        label,\n        go: () => this.setState(s => ({ [key]: !s[key] })),\n        bg: on ? \"rgba(58,160,255,.18)\" : \"rgba(255,255,255,.03)\",\n        border: on ? \"rgba(120,180,240,.5)\" : \"rgba(255,255,255,.08)\",\n        color: on ? \"#ffffff\" : \"#9fb2c2\",\n        dot: on ? \"#5fd17a\" : \"#5b6671\",\n      };\n    };\n\n    const isTournament = this.state.eventType === \"Tournament\";\n\n    const typeCards = [\n      { name:\"Tournament\", icon:\"\\uD83C\\uDFC6\", art:\"linear-gradient(125deg,#2b5876,#1c3a5e)\",\n        desc:\"Competitive bracket with rankings, prize money, and team play.\",\n        pick:() => this.setState({ eventType:\"Tournament\", step:\"form\" }) },\n      { name:\"Game Jam\", icon:\"\\uD83C\\uDFAE\", art:\"linear-gradient(125deg,#614385,#3a2151)\",\n        desc:\"Time-boxed creative challenge around a theme. Build and submit a game.\",\n        pick:() => this.setState({ eventType:\"Game Jam\", step:\"form\" }) },\n    ];\n\n    const splitOpt = (label, key) => {\n      const on = this.state.prizeSplit === key;\n      return {\n        label, pick:() => this.setState({ prizeSplit:key }),\n        bg: on ? \"rgba(58,160,255,.18)\" : \"#0d141c\",\n        border: on ? \"rgba(120,180,240,.6)\" : \"rgba(255,255,255,.08)\",\n        color: on ? \"#ffffff\" : \"#9fb2c2\",\n        ring: on ? \"#66c0f4\" : \"#4a5765\",\n        dot: on ? \"#66c0f4\" : \"transparent\",\n      };\n    };\n\n    // ---- detail view ----\n    const di = this.state.detailIdx;\n    const detailOpen = di !== null && di >= 0 && di < allEvents.length && !this.state.creating;\n    let d = null;\n    if (detailOpen) {\n      const ev = allEvents[di];\n      const msgs = (this.state.chats[di] || []);\n      const partList = parseInt(ev.players, 10) || 0;\n      const sampleNames = [\"Nova\",\"Pixel\",\"Quill\",\"Ridge\",\"Sable\",\"Tess\",\"Vega\",\"Wren\"];\n      const participants = Array.from({length: Math.min(partList, 6)}, (_, i) => {\n        const n = sampleNames[i % sampleNames.length];\n        return { name: n, initial: n[0], bg: this.avatarBg(n) };\n      });\n      d = {\n        name: ev.name, organizer: ev.organizer, prize: ev.prize, type: ev.type, typeBg: ev.typeBg,\n        statusColor: ev.open ? \"#5fd17a\" : \"#ff7a6b\",\n        statusLabel: ev.open ? \"Open list\" : \"Full\",\n        distribution: ev.distribution, description: ev.description,\n        dates: [ {label:\"Registration deadline\", value:ev.dates[0]}, {label:\"Start\", value:ev.dates[1]}, {label:\"End\", value:ev.dates[2]} ],\n        participantCount: participants.length,\n        hasParticipants: participants.length > 0,\n        noParticipants: participants.length === 0,\n        participants,\n      };\n    }\n    const messages = (di !== null ? (this.state.chats[di] || []) : []);\n\n    return {\n      query: this.state.query,\n      onSearch: (e) => this.setState({ query: e.target.value }),\n      type: this.state.type,\n      onType: (e) => this.setState({ type: e.target.value }),\n      chips: [ chip(\"Only open registration\", \"openOnly\"), chip(\"Only with prize money\", \"prizeOnly\") ],\n      events,\n      count: events.length,\n      hasResults: events.length > 0,\n      isEmpty: events.length === 0,\n\n      // detail\n      detailOpen,\n      d: d || {},\n      messages,\n      chatEmpty: messages.length === 0,\n      draft: this.state.draft,\n      onDraft: (e) => this.setState({ draft: e.target.value }),\n      onKey: (e) => { if (e.key === \"Enter\") this.sendMsg(); },\n      send: () => this.sendMsg(),\n      closeDetail: () => this.setState({ detailIdx: null, draft: \"\" }),\n      deleteEvent: () => this.setState({ detailIdx: null, draft: \"\" }),\n\n      // host form\n      creating: this.state.creating,\n      browsing: !this.state.creating && !detailOpen,\n      stepType: this.state.creating && this.state.step === \"type\",\n      stepForm: this.state.creating && this.state.step === \"form\",\n      isTournament,\n      hostTitle: this.state.step === \"type\" ? \"What do you want to host?\"\n                  : (isTournament ? \"New tournament\" : \"New game jam\"),\n      titlePlaceholder: isTournament ? \"e.g. Indie Speedrun Cup\" : \"e.g. 48h Pixel Jam\",\n      sizeLabel: isTournament ? \"Tournament size (max participants/teams)\" : \"Max participants\",\n      titleField: \"Title\",\n      typeCards,\n      splitOptions: [ splitOpt(\"Winner takes all\",\"winner\"), splitOpt(\"Split across places 1\\u20133\",\"split\") ],\n      dateFields: [ {label:\"Registration deadline\"}, {label:\"Start\"}, {label:\"End\"} ],\n      isPrivate: this.state.isPrivate,\n      privBorder: this.state.isPrivate ? \"rgba(120,180,240,.6)\" : \"rgba(255,255,255,.15)\",\n      privBg: this.state.isPrivate ? \"linear-gradient(180deg,#3aa0ff,#2475c7)\" : \"#0d141c\",\n      openForm: () => this.setState({ creating:true, step:\"type\" }),\n      closeForm: () => this.setState({ creating:false, step:\"type\", eventType:null }),\n      backToType: () => this.setState({ step:\"type\" }),\n      togglePrivate: () => this.setState(s => ({ isPrivate: !s.isPrivate })),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
