server {
    listen 80;
    server_name api.dove.example;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.dove.example;

    ssl_certificate     /etc/letsencrypt/live/api.dove.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dove.example/privkey.pem;

    # Game file uploads can be large — mirrors MAX_GAME_FILE_BYTES in main.rs.
    client_max_body_size 5G;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
